<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word 文档格式化工具</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Header -->
<header class="app-header">
  <span class="logo">📄</span>
  <div>
    <h1>Word 文档格式化工具</h1>
    <p>本地处理 · 不上传服务器 · 支持 .docx 格式</p>
  </div>
</header>

<main class="container">

  <!-- Drop Zone -->
  <div id="drop-zone">
    <div class="drop-icon">📂</div>
    <div class="drop-title">拖拽 .docx 文件到此处</div>
    <div class="drop-sub">或点击此处选择文件</div>
    <input type="file" id="file-input" accept=".docx" style="display:none" />
  </div>

  <!-- File loaded info bar -->
  <div id="file-info">
    <span class="file-icon">📝</span>
    <span id="file-name"></span>
    <button id="change-file">更换文件</button>
  </div>

  <!-- Section 1: Body Text -->
  <div class="card">
    <div class="card-header">🔤 正文格式</div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label for="body-font">正文字体</label>
          <select id="body-font">
            <option>宋体</option>
            <option>黑体</option>
            <option>微软雅黑</option>
            <option>仿宋</option>
            <option>楷体</option>
            <option>Times New Roman</option>
            <option>Arial</option>
            <option>Calibri</option>
          </select>
        </div>
        <div class="form-group">
          <label for="body-size">正文字号</label>
          <select id="body-size">
            <option>初号</option>
            <option>小初</option>
            <option>一号</option>
            <option>小一</option>
            <option>二号</option>
            <option>小二</option>
            <option>三号</option>
            <option>小三</option>
            <option>四号</option>
            <option selected>小四</option>
            <option>五号</option>
            <option>小五</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Section 2: Headings -->
  <div class="card">
    <div class="card-header">📑 标题格式</div>
    <div class="card-body">
      <table class="heading-table">
        <thead>
          <tr>
            <th>级别</th>
            <th>字体</th>
            <th>字号</th>
            <th>加粗</th>
            <th>颜色</th>
          </tr>
        </thead>
        <tbody id="headings-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Section 3: Spacing -->
  <div class="card">
    <div class="card-header">↕ 间距设置</div>
    <div class="card-body">
      <div style="margin-bottom:10px">
        <label style="font-size:12px;font-weight:500;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:8px">行间距</label>
        <div class="spacing-row">
          <label><input type="radio" name="line-spacing" value="1.0" /> 单倍</label>
          <label><input type="radio" name="line-spacing" value="1.5" checked /> 1.5 倍</label>
          <label><input type="radio" name="line-spacing" value="2.0" /> 双倍</label>
          <label><input type="radio" name="line-spacing" value="custom" /> 固定值</label>
          <span id="line-custom-wrap">
            <input type="number" id="custom-line" value="28" min="10" max="100" step="0.5" />
            <span>磅</span>
          </span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="before-pt">段前间距（磅）</label>
          <input type="number" id="before-pt" value="0" min="0" max="72" step="1" />
        </div>
        <div class="form-group">
          <label for="after-pt">段后间距（磅）</label>
          <input type="number" id="after-pt" value="0" min="0" max="72" step="1" />
        </div>
      </div>
    </div>
  </div>

  <!-- Section 4: Margins (collapsible) -->
  <div class="card">
    <div class="card-body">
      <button id="margins-toggle">▶ 页边距设置（可选）</button>
      <div id="margins-panel" style="display:none">
        <div class="apply-margins-row">
          <input type="checkbox" id="apply-margins" />
          <label for="apply-margins">应用以下页边距</label>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="margin-top">上边距（厘米）</label>
            <input type="number" id="margin-top" value="2.54" min="0" max="10" step="0.1" />
          </div>
          <div class="form-group">
            <label for="margin-bottom">下边距（厘米）</label>
            <input type="number" id="margin-bottom" value="2.54" min="0" max="10" step="0.1" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="margin-left">左边距（厘米）</label>
            <input type="number" id="margin-left" value="3.18" min="0" max="10" step="0.1" />
          </div>
          <div class="form-group">
            <label for="margin-right">右边距（厘米）</label>
            <input type="number" id="margin-right" value="3.18" min="0" max="10" step="0.1" />
          </div>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- Action Bar -->
<div class="action-bar">
  <button id="action-btn" disabled>格式化并下载</button>
  <button id="reset-btn">重置默认值</button>
  <span id="status" class="status info">请上传 .docx 文件</span>
</div>

<!-- JSZip CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ============================================================
// PREVENT BROWSER FROM HANDLING FILE DROPS ANYWHERE ON THE PAGE
// This must come before anything else.
// ============================================================
document.addEventListener("dragover", function(e) { e.preventDefault(); });
document.addEventListener("drop",     function(e) { e.preventDefault(); });

// ============================================================
// Build heading table rows
// ============================================================
(function buildHeadingRows() {
  var headingDefaults = [
    { font: "黑体", size: "二号" },
    { font: "黑体", size: "三号" },
    { font: "黑体", size: "小三" },
    { font: "黑体", size: "四号" },
    { font: "黑体", size: "小四" },
    { font: "黑体", size: "小四" },
  ];
  var fonts = ["宋体","黑体","微软雅黑","仿宋","楷体","Times New Roman","Arial","Calibri"];
  var sizes = ["初号","小初","一号","小一","二号","小二","三号","小三","四号","小四","五号","小五"];
  var tbody = document.getElementById("headings-tbody");
  headingDefaults.forEach(function(d, i) {
    var n = i + 1;
    var fontOpts = fonts.map(function(f) { return '<option' + (f===d.font?' selected':'') + '>' + f + '</option>'; }).join("");
    var sizeOpts = sizes.map(function(s) { return '<option' + (s===d.size?' selected':'') + '>' + s + '</option>'; }).join("");
    tbody.insertAdjacentHTML("beforeend",
      '<tr>' +
      '<td><span class="heading-label">H' + n + '</span></td>' +
      '<td><select id="h' + n + '-font">' + fontOpts + '</select></td>' +
      '<td><select id="h' + n + '-size">' + sizeOpts + '</select></td>' +
      '<td><input type="checkbox" id="h' + n + '-bold" checked /></td>' +
      '<td><input type="color" id="h' + n + '-color" value="#000000" /></td>' +
      '</tr>'
    );
  });
})();

// ============================================================
// XML Utilities
// ============================================================
var W_NS = "http://schemas.openxmlformats.org/wordprocessingml/2006/main";

function parseXml(str) {
  var doc = new DOMParser().parseFromString(str, "application/xml");
  var err = doc.querySelector("parsererror");
  if (err) throw new Error("XML 解析失败: " + err.textContent.slice(0, 200));
  return doc;
}

function serializeXml(doc) {
  return new XMLSerializer().serializeToString(doc);
}

function getEls(node, localName) {
  return Array.from(node.getElementsByTagNameNS(W_NS, localName));
}

function getFirstEl(node, localName) {
  return node.getElementsByTagNameNS(W_NS, localName)[0] || null;
}

function createWEl(doc, localName) {
  return doc.createElementNS(W_NS, "w:" + localName);
}

// Use setAttribute (not setAttributeNS) to avoid browser XML serializer
// producing duplicate namespace declarations that bloat/break the output.
function setWAttr(el, localName, value) {
  el.setAttribute("w:" + localName, String(value));
}

// Read a w: attribute from a parsed OOXML element.
// DOMParser stores namespace-prefixed attributes under their namespace URI,
// but some tools omit the namespace URI; try both.
function getWAttr(el, localName) {
  return el.getAttributeNS(W_NS, localName) || el.getAttribute("w:" + localName) || "";
}

// Ensure a direct-child element exists.
// insertAtStart=true: insert as first child (required for pPr, rPr).
function ensureDirectChild(parent, localName, doc, insertAtStart) {
  for (var i = 0; i < parent.childNodes.length; i++) {
    var c = parent.childNodes[i];
    if (c.nodeType === 1 && c.localName === localName && c.namespaceURI === W_NS) return c;
  }
  var el = createWEl(doc, localName);
  if (insertAtStart && parent.firstChild) {
    parent.insertBefore(el, parent.firstChild);
  } else {
    parent.appendChild(el);
  }
  return el;
}

// Replace or append a direct child by local name
function replaceDirectChild(parent, localName, newEl) {
  for (var i = 0; i < parent.childNodes.length; i++) {
    var c = parent.childNodes[i];
    if (c.nodeType === 1 && c.localName === localName && c.namespaceURI === W_NS) {
      parent.replaceChild(newEl, c);
      return;
    }
  }
  parent.appendChild(newEl);
}

// Remove a direct child by local name
function removeDirectChild(parent, localName) {
  for (var i = parent.childNodes.length - 1; i >= 0; i--) {
    var c = parent.childNodes[i];
    if (c.nodeType === 1 && c.localName === localName && c.namespaceURI === W_NS) {
      parent.removeChild(c);
      return;
    }
  }
}

// ============================================================
// Font size map (Chinese labels → pt)
// ============================================================
var FONT_SIZES = {
  "初号": 42, "小初": 36,
  "一号": 26, "小一": 24,
  "二号": 22, "小二": 18,
  "三号": 16, "小三": 15,
  "四号": 14, "小四": 12,
  "五号": 10.5, "小五": 9,
};

// ============================================================
// styles.xml patcher
// ============================================================
var HEADING_IDS = [
  ["Heading1", "标题1", "标题 1"],
  ["Heading2", "标题2", "标题 2"],
  ["Heading3", "标题3", "标题 3"],
  ["Heading4", "标题4", "标题 4"],
  ["Heading5", "标题5", "标题 5"],
  ["Heading6", "标题6", "标题 6"],
];
var NORMAL_IDS = ["Normal", "正文", "默认段落字体"];

function findStyleNode(stylesDoc, candidates) {
  var styles = getEls(stylesDoc, "style");
  for (var i = 0; i < styles.length; i++) {
    var id = getWAttr(styles[i], "styleId");
    if (candidates.indexOf(id) !== -1) return styles[i];
  }
  return null;
}

function getOrCreateStyleNode(stylesDoc, canonicalId, candidates) {
  var node = findStyleNode(stylesDoc, candidates);
  if (!node) {
    node = createWEl(stylesDoc, "style");
    setWAttr(node, "type", "paragraph");
    setWAttr(node, "styleId", canonicalId);
    var root = getFirstEl(stylesDoc, "styles") || stylesDoc.documentElement;
    root.appendChild(node);
  }
  return node;
}

function buildRFonts(doc, font) {
  var el = createWEl(doc, "rFonts");
  setWAttr(el, "ascii", font);
  setWAttr(el, "hAnsi", font);
  setWAttr(el, "eastAsia", font);
  setWAttr(el, "cs", font);
  return el;
}

function buildSzEl(doc, localName, pt) {
  var el = createWEl(doc, localName);
  setWAttr(el, "val", String(Math.round(pt * 2)));
  return el;
}

function patchStyleRpr(styleNode, doc, font, sizePt, bold, color) {
  var rPr = ensureDirectChild(styleNode, "rPr", doc, false);
  if (font)   replaceDirectChild(rPr, "rFonts", buildRFonts(doc, font));
  if (sizePt) {
    replaceDirectChild(rPr, "sz",   buildSzEl(doc, "sz",   sizePt));
    replaceDirectChild(rPr, "szCs", buildSzEl(doc, "szCs", sizePt));
  }
  removeDirectChild(rPr, "b");
  removeDirectChild(rPr, "bCs");
  if (bold) {
    rPr.appendChild(createWEl(doc, "b"));
    rPr.appendChild(createWEl(doc, "bCs"));
  }
  removeDirectChild(rPr, "color");
  if (color && color !== "#000000") {
    var cEl = createWEl(doc, "color");
    setWAttr(cEl, "val", color.replace("#", ""));
    rPr.appendChild(cEl);
  }
}

function patchStylePpr(styleNode, doc, lineValue, lineRule, beforePt, afterPt) {
  var pPr = ensureDirectChild(styleNode, "pPr", doc, false);
  removeDirectChild(pPr, "spacing");
  var sp = createWEl(doc, "spacing");
  if (lineValue != null) { setWAttr(sp, "line", lineValue); setWAttr(sp, "lineRule", lineRule || "auto"); }
  if (beforePt != null)  setWAttr(sp, "before", Math.round(beforePt * 20));
  if (afterPt != null)   setWAttr(sp, "after",  Math.round(afterPt * 20));
  pPr.appendChild(sp);
  removeDirectChild(pPr, "contextualSpacing");
}

function patchStyles(stylesXml, config) {
  var doc = parseXml(stylesXml);

  // Normal / body style
  var normalNode = getOrCreateStyleNode(doc, "Normal", NORMAL_IDS);
  patchStyleRpr(normalNode, doc, config.body.font, config.body.sizePt, false, null);
  patchStylePpr(normalNode, doc, config.body.lineValue, config.body.lineRule, config.body.beforePt, config.body.afterPt);

  // Heading styles
  config.headings.forEach(function(h, i) {
    var candidates = HEADING_IDS[i];
    var canonicalId = candidates[0];
    var styleNode = getOrCreateStyleNode(doc, canonicalId, candidates);

    // Ensure <w:name> exists
    if (!getFirstEl(styleNode, "name")) {
      var nameEl = createWEl(doc, "name");
      setWAttr(nameEl, "val", "heading " + (i + 1));
      styleNode.insertBefore(nameEl, styleNode.firstChild);
    }

    patchStyleRpr(styleNode, doc, h.font, h.sizePt, h.bold !== false, h.color || null);
    patchStylePpr(styleNode, doc,
      h.lineValue || config.body.lineValue,
      h.lineRule  || config.body.lineRule,
      h.beforePt != null ? h.beforePt : 6,
      h.afterPt  != null ? h.afterPt  : 6
    );
  });

  return serializeXml(doc);
}

// ============================================================
// document.xml patcher
// ============================================================
var HEADING_PATTERN = /^(Heading\s*[1-6]|标题\s*[1-6])$/i;

function getParaStyleId(para) {
  var pPr = getFirstEl(para, "pPr");
  if (!pPr) return null;
  var pStyle = getFirstEl(pPr, "pStyle");
  if (!pStyle) return null;
  return getWAttr(pStyle, "val") || null;
}

// Remove ALL direct children with the given local name (not just the first).
function removeAllDirectChildren(parent, localName) {
  var toRemove = [];
  for (var i = 0; i < parent.childNodes.length; i++) {
    var c = parent.childNodes[i];
    if (c.nodeType === 1 && c.localName === localName && c.namespaceURI === W_NS) toRemove.push(c);
  }
  for (var j = 0; j < toRemove.length; j++) parent.removeChild(toRemove[j]);
}

function patchParaSpacing(para, doc, lineValue, lineRule, beforePt, afterPt) {
  // pPr must be the FIRST child of <w:p>
  var pPr = ensureDirectChild(para, "pPr", doc, true);
  // Remove ALL existing spacing elements (some docs have duplicates)
  removeAllDirectChildren(pPr, "spacing");
  var sp = createWEl(doc, "spacing");
  if (lineValue != null) { setWAttr(sp, "line", lineValue); setWAttr(sp, "lineRule", lineRule || "auto"); }
  if (beforePt != null)  setWAttr(sp, "before", Math.round(beforePt * 20));
  if (afterPt != null)   setWAttr(sp, "after",  Math.round(afterPt  * 20));
  pPr.appendChild(sp);
  removeAllDirectChildren(pPr, "contextualSpacing");
}

// Get heading level (1-6) from style ID, or 0 if not a heading.
function getHeadingLevel(styleId) {
  var m = styleId && styleId.match(/^(?:Heading|标题)\s*([1-6])$/i);
  return m ? parseInt(m[1], 10) : 0;
}

function patchDocument(docXml, config) {
  var doc = parseXml(docXml);
  var paragraphs = getEls(doc, "p");

  paragraphs.forEach(function(para) {
    var styleId = getParaStyleId(para) || "Normal";
    var headingLevel = getHeadingLevel(styleId);
    var isHeading = headingLevel > 0;

    if (isHeading) {
      // Apply heading spacing DIRECTLY to document.xml too.
      // Styles.xml alone is not enough — direct <w:spacing> in the paragraph's
      // pPr takes precedence and will block the styles.xml value if not cleared.
      var hCfg = config.headings[headingLevel - 1] || {};
      patchParaSpacing(para, doc,
        hCfg.lineValue || config.body.lineValue,
        hCfg.lineRule  || config.body.lineRule,
        hCfg.beforePt != null ? hCfg.beforePt : 6,
        hCfg.afterPt  != null ? hCfg.afterPt  : 6);
    } else {
      patchParaSpacing(para, doc,
        config.body.lineValue, config.body.lineRule,
        config.body.beforePt, config.body.afterPt);
    }

    // Patch runs
    var runs = getEls(para, "r");
    runs.forEach(function(run) {
      // Skip field code runs
      if (getFirstEl(run, "instrText")) return;

      // rPr must be the FIRST child of <w:r>
      var rPr = ensureDirectChild(run, "rPr", doc, true);

      if (!isHeading) {
        // Body: stamp font + size directly
        if (config.body.font)   replaceDirectChild(rPr, "rFonts", buildRFonts(doc, config.body.font));
        if (config.body.sizePt) {
          replaceDirectChild(rPr, "sz",   buildSzEl(doc, "sz",   config.body.sizePt));
          replaceDirectChild(rPr, "szCs", buildSzEl(doc, "szCs", config.body.sizePt));
        }
      } else {
        // Heading: strip direct font/size overrides so styles.xml takes effect
        removeDirectChild(rPr, "rFonts");
        removeDirectChild(rPr, "sz");
        removeDirectChild(rPr, "szCs");
        removeDirectChild(rPr, "rStyle");
      }
    });
  });

  // Page margins
  if (config.margins) {
    var CM = 567; // 1cm ≈ 567 twips
    var sectPr = getFirstEl(doc, "sectPr");
    if (sectPr) {
      removeDirectChild(sectPr, "pgMar");
      var pgMar = createWEl(doc, "pgMar");
      setWAttr(pgMar, "top",    Math.round(config.margins.top    * CM));
      setWAttr(pgMar, "bottom", Math.round(config.margins.bottom * CM));
      setWAttr(pgMar, "left",   Math.round(config.margins.left   * CM));
      setWAttr(pgMar, "right",  Math.round(config.margins.right  * CM));
      setWAttr(pgMar, "header", 851);
      setWAttr(pgMar, "footer", 992);
      setWAttr(pgMar, "gutter", 0);
      sectPr.appendChild(pgMar);
    }
  }

  return serializeXml(doc);
}

// ============================================================
// Download helper
// ============================================================
async function downloadFormatted(zip, patchedFiles, originalName) {
  patchedFiles.forEach(function(xml, path) { zip.file(path, xml); });
  var blob = await zip.generateAsync({
    type: "blob",
    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    compression: "DEFLATE",
    compressionOptions: { level: 6 },
  });
  var safeName = originalName.replace(/\.docx$/i, "") + "_formatted.docx";
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = safeName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
}

// ============================================================
// App state & UI wiring
// ============================================================
var appState = { zip: null, files: null, fileName: null };

var dropZone      = document.getElementById("drop-zone");
var fileInput     = document.getElementById("file-input");
var fileInfo      = document.getElementById("file-info");
var fileNameEl    = document.getElementById("file-name");
var changeFileBtn = document.getElementById("change-file");
var actionBtn     = document.getElementById("action-btn");
var statusEl      = document.getElementById("status");
var resetBtn      = document.getElementById("reset-btn");
var marginsToggle = document.getElementById("margins-toggle");
var marginsPanel  = document.getElementById("margins-panel");
var lineCustomWrap= document.getElementById("line-custom-wrap");

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = "status " + (type || "info");
}

function getSelectedLineSpacing() {
  var checked = document.querySelector('input[name="line-spacing"]:checked');
  return checked ? checked.value : "1.5";
}

function getLineValue(val, customPt) {
  if (val === "1.0")    return { lineValue: 240, lineRule: "auto" };
  if (val === "1.5")    return { lineValue: 360, lineRule: "auto" };
  if (val === "2.0")    return { lineValue: 480, lineRule: "auto" };
  if (val === "custom") return { lineValue: Math.round((parseFloat(customPt) || 28) * 20), lineRule: "exact" };
  return { lineValue: 360, lineRule: "auto" };
}

function collectConfig() {
  var bodyFont   = document.getElementById("body-font").value;
  var bodySizePt = FONT_SIZES[document.getElementById("body-size").value] || 12;
  var lv = getLineValue(getSelectedLineSpacing(), document.getElementById("custom-line").value);
  var beforePt = parseFloat(document.getElementById("before-pt").value) || 0;
  var afterPt  = parseFloat(document.getElementById("after-pt").value)  || 0;

  var headings = [1,2,3,4,5,6].map(function(i) {
    return {
      font:   document.getElementById("h" + i + "-font").value,
      sizePt: FONT_SIZES[document.getElementById("h" + i + "-size").value] || 14,
      bold:   document.getElementById("h" + i + "-bold").checked,
      color:  document.getElementById("h" + i + "-color").value,
    };
  });

  var margins = null;
  if (document.getElementById("apply-margins").checked) {
    margins = {
      top:    parseFloat(document.getElementById("margin-top").value)    || 2.54,
      bottom: parseFloat(document.getElementById("margin-bottom").value) || 2.54,
      left:   parseFloat(document.getElementById("margin-left").value)   || 3.18,
      right:  parseFloat(document.getElementById("margin-right").value)  || 3.18,
    };
  }

  return {
    body: { font: bodyFont, sizePt: bodySizePt, lineValue: lv.lineValue, lineRule: lv.lineRule, beforePt: beforePt, afterPt: afterPt },
    headings: headings,
    margins: margins,
  };
}

// File loading
async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith(".docx")) {
    setStatus("请上传 .docx 格式的文件", "error"); return;
  }
  setStatus("正在读取文件...", "info");
  try {
    var zip;
    try { zip = await JSZip.loadAsync(file); }
    catch(e) { throw new Error("文件解析失败，请确认是有效的 .docx 文件"); }

    var files = new Map();
    var paths = ["word/document.xml", "word/styles.xml"];
    for (var i = 0; i < paths.length; i++) {
      var entry = zip.file(paths[i]);
      if (entry) files.set(paths[i], await entry.async("string"));
    }
    if (!files.has("word/document.xml")) throw new Error("无效的 Word 文档（缺少 document.xml）");

    appState.zip = zip;
    appState.files = files;
    appState.fileName = file.name;

    dropZone.style.display = "none";
    fileInfo.style.display = "flex";
    fileNameEl.textContent = file.name;
    actionBtn.disabled = false;
    setStatus("文件已加载，请配置格式后点击「格式化并下载」", "success");
  } catch(e) {
    setStatus("加载失败：" + e.message, "error");
  }
}

// Format & download
async function handleFormat() {
  if (!appState.zip) return;
  actionBtn.disabled = true;
  var config = collectConfig();
  try {
    setStatus("正在修改样式定义...", "info");
    await new Promise(function(r) { setTimeout(r, 30); });
    var newStyles = patchStyles(appState.files.get("word/styles.xml"), config);

    setStatus("正在修改段落格式...", "info");
    await new Promise(function(r) { setTimeout(r, 30); });
    var newDoc = patchDocument(appState.files.get("word/document.xml"), config);

    var patched = new Map();
    patched.set("word/styles.xml", newStyles);
    patched.set("word/document.xml", newDoc);

    setStatus("正在打包下载...", "info");
    await new Promise(function(r) { setTimeout(r, 30); });
    await downloadFormatted(appState.zip, patched, appState.fileName);
    setStatus("完成！文件已下载。", "success");
  } catch(e) {
    console.error(e);
    setStatus("处理失败：" + e.message, "error");
  } finally {
    actionBtn.disabled = false;
  }
}

// Reset defaults
function resetToDefaults() {
  document.getElementById("body-font").value = "宋体";
  document.getElementById("body-size").value = "小四";
  var r = document.querySelector('input[name="line-spacing"][value="1.5"]');
  if (r) r.checked = true;
  document.getElementById("custom-line").value = "28";
  document.getElementById("before-pt").value = "0";
  document.getElementById("after-pt").value = "0";
  document.getElementById("margin-top").value = "2.54";
  document.getElementById("margin-bottom").value = "2.54";
  document.getElementById("margin-left").value = "3.18";
  document.getElementById("margin-right").value = "3.18";
  lineCustomWrap.style.display = "none";

  var hDefaults = [
    {font:"黑体",size:"二号"},{font:"黑体",size:"三号"},{font:"黑体",size:"小三"},
    {font:"黑体",size:"四号"},{font:"黑体",size:"小四"},{font:"黑体",size:"小四"},
  ];
  hDefaults.forEach(function(h, i) {
    var n = i + 1;
    document.getElementById("h"+n+"-font").value = h.font;
    document.getElementById("h"+n+"-size").value = h.size;
    document.getElementById("h"+n+"-bold").checked = true;
    document.getElementById("h"+n+"-color").value = "#000000";
  });
}

// ── Event listeners ──

// Drop zone drag & drop
dropZone.addEventListener("dragover", function(e) {
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.add("drag-over");
});
dropZone.addEventListener("dragleave", function(e) {
  // Only remove highlight if leaving the drop zone itself (not a child element)
  if (!dropZone.contains(e.relatedTarget)) {
    dropZone.classList.remove("drag-over");
  }
});
dropZone.addEventListener("drop", function(e) {
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.remove("drag-over");
  var file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
dropZone.addEventListener("click", function() { fileInput.click(); });

fileInput.addEventListener("change", function() {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

changeFileBtn.addEventListener("click", function() {
  dropZone.style.display = "";
  fileInfo.style.display = "none";
  actionBtn.disabled = true;
  appState = { zip: null, files: null, fileName: null };
  fileInput.value = "";
  setStatus("请上传 .docx 文件", "info");
});

actionBtn.addEventListener("click", handleFormat);
resetBtn.addEventListener("click", resetToDefaults);

document.querySelectorAll('input[name="line-spacing"]').forEach(function(radio) {
  radio.addEventListener("change", function() {
    lineCustomWrap.style.display = this.value === "custom" ? "flex" : "none";
  });
});

marginsToggle.addEventListener("click", function() {
  var open = marginsPanel.style.display !== "none";
  marginsPanel.style.display = open ? "none" : "block";
  marginsToggle.textContent = open ? "▶ 页边距设置（可选）" : "▼ 页边距设置（可选）";
});

// Init
resetToDefaults();
</script>
